<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aerial Flow — Вход в админку</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8e8f0 0%, #e8d5f0 50%, #f0e4f8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(107,58,122,0.1);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo .logo-icon {
            font-size: 32px;
            color: #6b3a7a;
        }
        .login-logo h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: #2d1b36;
            margin-top: 8px;
        }
        .login-logo p {
            color: #6b5a7a;
            font-size: 14px;
            margin-top: 4px;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #2d1b36;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(107,58,122,0.15);
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            background: rgba(255,255,255,0.8);
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: #6b3a7a;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #d4b8e0, #6b3a7a);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .error {
            background: #fef2f2;
            color: #dc2626;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 16px;
            text-align: center;
        }
        .login-footer {
            text-align: center;
            margin-top: 24px;
        }
        .login-footer a {
            color: #6b5a7a;
            font-size: 13px;
            text-decoration: none;
        }
        .login-footer a:hover { color: #2d1b36; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <div class="logo-icon">✦</div>
            <h1>Aerial Flow</h1>
            <p>Вход в панель управления</p>
        </div>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <div class="form-group">
                <label>Логин</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn">Войти</button>
        </form>
        <div class="login-footer">
            <a href="/">← Вернуться на сайт</a>
        </div>
    </div>
</body>
</html>
