<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if event %}Редактировать{% else %}Добавить{% endif %} событие — Aerial Flow Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8f4fa; color: #2d1b36; }
        .admin-layout { display: flex; min-height: 100vh; }
        .admin-sidebar {
            width: 240px;
            background: linear-gradient(180deg, #2d1b36, #4a2a5a);
            padding: 24px 0; flex-shrink: 0;
        }
        .admin-sidebar .logo {
            display: block; text-align: center;
            padding: 0 20px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 16px; text-decoration: none;
        }
        .admin-sidebar .logo span {
            font-family: 'Playfair Display', serif;
            color: white; font-size: 22px;
        }
        .admin-sidebar .logo small {
            display: block; color: rgba(255,255,255,0.6);
            font-size: 11px; margin-top: 4px;
        }
        .admin-nav a {
            display: block; padding: 12px 24px;
            color: rgba(255,255,255,0.7);
            text-decoration: none; font-size: 14px; transition: all 0.2s;
        }
        .admin-nav a:hover, .admin-nav a.active {
            background: rgba(255,255,255,0.1); color: white;
        }
        .admin-nav a.active { border-left: 3px solid #d4b8e0; }
        .admin-main { flex: 1; padding: 32px; max-width: 700px; }
        .admin-header { margin-bottom: 32px; }
        .admin-header h1 { font-family: 'Playfair Display', serif; font-size: 28px; }
        .admin-header a {
            color: #6b5a7a; font-size: 14px; text-decoration: none;
            display: inline-block; margin-top: 8px;
        }
        .admin-header a:hover { color: #2d1b36; }
        .form-card {
            background: white; border-radius: 16px;
            padding: 32px; box-shadow: 0 2px 12px rgba(107,58,122,0.08);
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; font-size: 13px; font-weight: 500;
            color: #2d1b36; margin-bottom: 6px;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 12px 16px;
            border: 1px solid rgba(107,58,122,0.15);
            border-radius: 12px; font-size: 14px;
            font-family: 'Inter', sans-serif;
            background: rgba(255,255,255,0.8); outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: #6b3a7a;
        }
        .form-group textarea { resize: vertical; min-height: 100px; }
        .form-checkbox { display: flex; align-items: center; gap: 8px; }
        .form-checkbox input { width: auto; }
        .btn {
            padding: 12px 32px; border-radius: 12px; border: none;
            font-size: 15px; font-weight: 500; font-family: 'Inter', sans-serif;
            cursor: pointer; transition: opacity 0.2s;
        }
        .btn-primary { background: #6b3a7a; color: white; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-secondary {
            background: none; border: 1px solid #d4b8e0;
            color: #6b5a7a; margin-left: 8px;
        }
        .btn-secondary:hover { background: #f8f4fa; }
        @media (max-width: 768px) {
            .admin-layout { flex-direction: column; }
            .admin-sidebar { width: 100%; padding: 12px 0; }
            .admin-nav { display: flex; overflow-x: auto; padding: 0 12px; }
            .admin-nav a { white-space: nowrap; padding: 10px 16px; }
            .admin-main { padding: 16px; }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="admin-layout">
        <div class="admin-sidebar">
            <a href="/admin" class="logo">
                <span>Aerial Flow</span>
                <small>Панель управления</small>
            </a>
            <nav class="admin-nav">
                <a href="/admin">Панель управления</a>
                <a href="/admin/leads">Заявки</a>
                <a href="/admin/events" class="active">События</a>
                <a href="/admin/news">Новости</a>
                <a href="/admin/generator">Генератор текстов</a>
                <a href="/admin/generated-texts">История текстов</a>
                <a href="/admin/post-planner">План публикаций</a>
                <a href="/admin/logout">Выйти</a>
            </nav>
        </div>
        <div class="admin-main">
            <div class="admin-header">
                <h1>{% if event %}Редактировать событие{% else %}Новое событие{% endif %}</h1>
                <a href="/admin/events">← Назад к списку</a>
            </div>
            <div class="form-card">
                <form method="POST">
                    <div class="form-group">
                        <label>Название</label>
                        <input type="text" name="title" value="{{ event.title if event else '' }}" required>
                    </div>
                    <div class="form-group">
                        <label>Дата</label>
                        <input type="date" name="date" value="{{ event.date if event else '' }}" required>
                    </div>
                    <div class="form-group">
                        <label>Описание</label>
                        <textarea name="description">{{ event.description if event else '' }}</textarea>
                    </div>
                    <div class="form-group">
                        <label>Количество мест</label>
                        <input type="number" name="places" value="{{ event.places if event else 10 }}" min="1">
                    </div>
                    <div class="form-group form-checkbox">
                        <label>
                            <input type="checkbox" name="is_active" {% if event and event.is_active %}checked{% elif not event %}checked{% endif %}>
                            <span>Активно (показывать на сайте)</span>
                        </label>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">
                            {% if event %}Сохранить{% else %}Добавить событие{% endif %}
                        </button>
                        <a href="/admin/events" class="btn btn-secondary">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
